<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  
  <!-- Outer ring -->
  <circle cx="50" cy="50" r="47" stroke="#00e5ff" stroke-width="1.5" fill="none" opacity="0.4"/>
  
  <!-- Inner ring -->
  <circle cx="50" cy="50" r="42" stroke="#00e5ff" stroke-width="0.5" fill="none" opacity="0.2"/>

  <!-- Background fill -->
  <circle cx="50" cy="50" r="47" fill="#030608"/>

  <!-- Corner ticks -->
  <line x1="50" y1="3" x2="50" y2="10" stroke="#00e5ff" stroke-width="1.5" opacity="0.6"/>
  <line x1="50" y1="90" x2="50" y2="97" stroke="#00e5ff" stroke-width="1.5" opacity="0.6"/>
  <line x1="3" y1="50" x2="10" y2="50" stroke="#00e5ff" stroke-width="1.5" opacity="0.6"/>
  <line x1="90" y1="50" x2="97" y2="50" stroke="#00e5ff" stroke-width="1.5" opacity="0.6"/>

  <!-- IM text -->
  <text x="50" y="46" font-family="Share Tech Mono, monospace" font-size="26" font-weight="bold" fill="#00e5ff" text-anchor="middle" letter-spacing="4">IM</text>

  <!-- Divider line -->
  <line x1="25" y1="52" x2="75" y2="52" stroke="#ff3d57" stroke-width="0.8" opacity="0.8"/>

  <!-- IN text -->
  <text x="50" y="68" font-family="Share Tech Mono, monospace" font-size="26" font-weight="bold" fill="#00e5ff" text-anchor="middle" letter-spacing="4">IN</text>

  <!-- Pulse dot -->
  <circle cx="50" cy="50" r="3" fill="#ff3d57">
    <animate attributeName="r" values="2;4;2" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
  </circle>

</svg>